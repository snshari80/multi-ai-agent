version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: multi-agent-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - multi-agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  multi-ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-ai-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CSE_ID=${GOOGLE_CSE_ID}
      - SERPER_KEY=${SERPER_KEY}
      - GOOGLE_API_POINT=${GOOGLE_API_POINT}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=5432
      - POSTGRES_AGENT_DB=${POSTGRES_AGENT_DB}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST}
      - OPENSEARCH_INDEX_NAME=${OPENSEARCH_INDEX_NAME}
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - USE_AWS_OPENSEARCH=${USE_AWS_OPENSEARCH}
      - BEDROCK_REGION=${BEDROCK_REGION}
      - BEDROCK_EMBEDDING_MODEL_ID=${BEDROCK_EMBEDDING_MODEL_ID}
      - BEDROCK_LLM_MODEL_ID=${BEDROCK_LLM_MODEL_ID}
      - BEDROCK_AWS_ACCESS_KEY_ID=${BEDROCK_AWS_ACCESS_KEY_ID}
      - BEDROCK_AWS_SECRET_ACCESS_KEY=${BEDROCK_AWS_SECRET_ACCESS_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - multi-agent-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  multi-agent-network:
    driver: bridge